<style type="text/css">
	body{
		cursor:url(src/default.cur), auto;
	}
	#bigcontainer{
			
		}
		#bigcontainer.form-success #container h1 {
			/* 特别注意这里的.form-success要紧跟在#bigcontainer的后面,
			不能有空格,否则将不能实现效果 */
			 transform: translateY(85px);
		}
		#container{
			text-align: center;
			height: 100px;
			line-height: 55px;
			/* margin-top: 7%; */
			margin: 0 auto;
		}
		#container h1{
			 color: rgb(22, 220, 255);
			 font-size: 40px;
		     font-weight: 300;
			 margin-bottom: 13px;
			 transition-duration: 1s;
			 /* 过程花费时间设计 */
			 transition-timing-function: ease-in-out;
			 /* 过渡时的一个效果.慢快慢 */
		}
		
		
		form input{
			/* 可以用#container input也可以这样form下的input */
			width: 250px;
			height: 45px;
			border: 1px solid rgba(255, 255, 255, 0.4);
			border-radius: 2px;
			background-color: rgba(255, 255, 255, 0.1);
			display: inline-block;
			color: orange;
			text-align: center;
			font-size: 20px;
		appearance: none;
		/* !*使div标签看上去更像一个按钮*! */
	    outline: 0;
		/* 突出元素的效果 */
		transition-duration: 0.3s;
		/* 在0.3s内完成变换 */
		}
		form input:hover{
			background-color: rgba(235, 235, 235, 0.3);
		}
	
		form input:focus{
			/* 当点击时 */
			width: 300px;
			background-color: white;
			color: #ee9ca7;
			font-weight: 300;
			/* transform: scaleX(1.2); */
			
		}
		form button{
			/* 同理上 */
			width: 250px;
			height: 50px;
			background-color: white;
			border: 1px solid rgba(255, 255, 255, 0.4);
			border-radius: 5px;
			color: red;
			font-size: 20px;
			font-weight: 400;
			cursor:url(src/hand.cur),auto;
		}
		form button:hover{				        
	    background-color: #e9ebec;
	}
</style>
