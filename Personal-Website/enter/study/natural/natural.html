<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="utf-8">
    <title>基础自习室</title>
    <link rel="stylesheet" type="text/css" href="change.css">
    <link href="https://cdn.bootcss.com/font-awesome/5.8.0/css/all.css" rel="stylesheet" />
    <link rel="stylesheet" type="text/css" href="http://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css?family=Bitter|Sedgwick+Ave+Display" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="style.css">

</head>
<body>
    <br>
    <h1>番茄时钟</h1>
   
    <div class="main">
        <div class="control">
            <div class="break">
            <p>休息时间</p>
                <i class="fas fa-minus-square" aria-hidden="true" id="break-minus"></i>
                <span id="break-length">5</span>
                <i class="fas fa-plus-square" aria-hidden="true" id="break-plus"></i>
            </div>
            <div class="length">
            <p>学习时间</p>
                <i class="fas fa-minus-square" aria-hidden="true" id="session-minus"></i>
                <span id="session-length">25</span>
                <i class="fas fa-plus-square" aria-hidden="true" id="session-plus"></i>
            </div>
        </div>
        <div class="clock">
            <h2 id="show-title">学习</h2>
             <center><h3 style="color:white;size:25px;">点击开始或停止</h3></center>     
            <h2 id="show-time">25:00</h2>
           
            <span id="per"></span>
            
        </div>
    </div>
		
   

   
     
   

<script src='http://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js'></script>
<script type="text/javascript" src="clock.js"></script>
</body>
</html>
